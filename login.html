<!DOCTYPE html>
<html lang="fr" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Cap Huma</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Supabase CDN (Standard Non-Module) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Charte graphique ALIMA / Cap Huma (identique à missions.html) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            DEFAULT: '#1d4ed8',
                            dark: '#1e3a8a',
                            light: '#eff6ff',
                        },
                        accent: {
                            DEFAULT: '#ea580c',
                            dark: '#c2410c',
                            light: '#fff7ed',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full bg-slate-50 font-sans flex items-center justify-center p-4" id="appBody" style="display: none;">

    <div class="w-full max-w-sm">
        <div class="flex flex-col items-center mb-8">
            <div class="flex h-16 w-16 items-center justify-center rounded-2xl bg-gradient-to-br from-primary to-accent text-white shadow-md mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-9 h-9">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 14.15v4.25c0 .621-.504 1.125-1.125 1.125H4.875c-.621 0-1.125-.504-1.125-1.125v-4.25m16.5 0a2.18 2.18 0 0 0 .75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 0 0-3.413-.387m4.5 8.006c-.194.165-.45.258-.717.258H3.571a.8.8 0 0 1-.717-.258m17.5 0a2.18 2.18 0 0 1-.75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 0 0-3.413-.387m0 0a48.58 48.58 0 0 0-6.177 0m6.177 0v1.502a2.25 2.25 0 0 1-2.25 2.25H9.75a2.25 2.25 0 0 1-2.25-2.25V6.144m6.177 0a48.114 48.114 0 0 0-3.413.387m0 0a48.58 48.58 0 0 1-6.177 0" />
                </svg>
            </div>
            <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">Cap Huma</h1>
            <p class="text-xs text-slate-400 font-semibold mt-1">Plateforme RH humanitaire — ALIMA</p>
        </div>

        <div class="bg-white border border-slate-200 rounded-3xl shadow-sm p-6">
            <h2 class="text-lg font-bold text-slate-800 mb-1">Connexion</h2>
            <p class="text-xs text-slate-400 mb-5">Accès réservé aux comptes créés par un administrateur ALIMA.</p>

            <form id="loginForm" class="space-y-4">
                <div class="space-y-1.5">
                    <label for="loginEmail" class="text-xs font-bold text-slate-500 uppercase">Email</label>
                    <input id="loginEmail" type="email" required autocomplete="username" placeholder="prenom.nom@alima.ngo" class="w-full rounded-lg border border-slate-200 p-2.5 text-sm text-slate-800 outline-none focus:border-primary" />
                </div>
                <div class="space-y-1.5">
                    <label for="loginPassword" class="text-xs font-bold text-slate-500 uppercase">Mot de passe</label>
                    <input id="loginPassword" type="password" required autocomplete="current-password" placeholder="••••••••" class="w-full rounded-lg border border-slate-200 p-2.5 text-sm text-slate-800 outline-none focus:border-primary" />
                </div>

                <p id="loginError" class="hidden text-xs font-semibold text-red-600 bg-red-50 border border-red-100 rounded-lg p-3"></p>

                <button type="submit" id="submitLoginBtn" class="w-full bg-primary hover:bg-primary-dark text-white px-5 py-3 rounded-lg text-sm font-bold shadow-md transition-all">
                    Se connecter
                </button>
            </form>

            <div class="mt-5 pt-4 border-t border-slate-100 text-center">
                <button type="button" id="resetConfigBtn" class="text-[11px] text-slate-400 hover:text-slate-600 font-semibold">
                    Modifier la configuration Supabase / IA
                </button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================================
        // 1. GARDE DE CONFIGURATION : redirection vers index.html si absente
        // ============================================================================
        const appBody = document.getElementById('appBody');

        const SUPABASE_URL = localStorage.getItem('supabase_url');
        const SUPABASE_ANON_KEY = localStorage.getItem('supabase_anon_key');

        if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
            window.location.replace('index.html');
        }

        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================================
        // 2. GARDE DE SESSION : si déjà connecté, on saute directement au dashboard
        // ============================================================================
        async function checkExistingSession() {
            try {
                const { data } = await supabaseClient.auth.getSession();
                if (data && data.session) {
                    window.location.href = 'dashboard.html';
                    return;
                }
            } catch (err) {
                console.warn('[Session Check] Aucune session active :', err.message);
            }
            appBody.style.display = 'flex';
        }

        checkExistingSession();

        // ============================================================================
        // 3. SOUMISSION DU FORMULAIRE DE CONNEXION
        // ============================================================================
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');
        const submitLoginBtn = document.getElementById('submitLoginBtn');

        loginForm.addEventListener('submit', async function (e) {
            e.preventDefault();
            loginError.classList.add('hidden');

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            submitLoginBtn.disabled = true;
            submitLoginBtn.textContent = 'Connexion...';

            try {
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;
                window.location.href = 'dashboard.html';
            } catch (err) {
                loginError.textContent = "Identifiants incorrects ou compte inexistant.";
                loginError.classList.remove('hidden');
                submitLoginBtn.disabled = false;
                submitLoginBtn.textContent = 'Se connecter';
            }
        });

        // ============================================================================
        // 4. RÉINITIALISATION DE LA CONFIGURATION
        // ============================================================================
        document.getElementById('resetConfigBtn').addEventListener('click', function () {
            localStorage.removeItem('supabase_url');
            localStorage.removeItem('supabase_anon_key');
            localStorage.removeItem('ai_api_url');
            localStorage.removeItem('ai_api_key');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
