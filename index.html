<!DOCTYPE html>
<html lang="fr" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cap Huma</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Supabase CDN (Standard Non-Module) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Charte graphique ALIMA / Cap Huma (identique à missions.html) -->
    <style type="text/tailwindcss">
        @theme {
            --font-sans: 'Inter', sans-serif;
            --color-primary: #1d4ed8;
            --color-primary-dark: #1e3a8a;
            --color-primary-light: #eff6ff;
            --color-accent: #ea580c;
            --color-accent-dark: #c2410c;
            --color-accent-light: #fff7ed;
        }
    </style>
</head>
<body class="h-full bg-slate-50 font-sans flex items-center justify-center p-4" id="appBody">

    <div class="w-full max-w-sm flex flex-col items-center gap-4">
        <div class="flex h-16 w-16 items-center justify-center rounded-2xl bg-gradient-to-br from-primary to-accent text-white shadow-md">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-9 h-9">
                <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 14.15v4.25c0 .621-.504 1.125-1.125 1.125H4.875c-.621 0-1.125-.504-1.125-1.125v-4.25m16.5 0a2.18 2.18 0 0 0 .75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 0 0-3.413-.387m4.5 8.006c-.194.165-.45.258-.717.258H3.571a.8.8 0 0 1-.717-.258m17.5 0a2.18 2.18 0 0 1-.75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 0 0-3.413-.387m0 0a48.58 48.58 0 0 0-6.177 0m6.177 0v1.502a2.25 2.25 0 0 1-2.25 2.25H9.75a2.25 2.25 0 0 1-2.25-2.25V6.144m6.177 0a48.114 48.114 0 0 0-3.413.387m0 0a48.58 48.58 0 0 1-6.177 0" />
            </svg>
        </div>
        <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">Cap Huma</h1>

        <div class="flex flex-col items-center gap-3 py-4">
            <svg class="animate-spin h-8 w-8 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            <p class="text-xs text-slate-400 font-semibold">Chargement...</p>
        </div>

        <p id="bootError" class="hidden text-xs font-semibold text-red-600 bg-red-50 border border-red-100 rounded-lg p-3 text-center"></p>
    </div>

    <script>
        // ============================================================================
        // CONFIGURATION SUPABASE — codée en dur (décision validée avec l'utilisateur).
        // La clé "anon" / "publishable" est conçue par Supabase pour être publique :
        // la sécurité réelle repose sur les policies RLS + les GRANT SQL côté serveur,
        // pas sur le secret de cette clé. Aucune donnée sensible n'est exposée ici.
        //
        // ⚠️ À REMPLACER avant déploiement par les vraies valeurs du projet Supabase :
        // ============================================================================
        const SUPABASE_URL = "https://bhjycotcmkqiumukkkih.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_mtQU2zMhbkCPZjgCX3Z4hw_POMFm_ml";

        // On les écrit dans le localStorage pour que TOUTES les autres pages déjà
        // livrées (dashboard.html, talents.html, admin.html, etc.), qui lisent encore
        // supabase_url / supabase_anon_key depuis le localStorage, continuent de
        // fonctionner sans modification. Ce pont sera retiré si ces pages sont un
        // jour toutes migrées vers la config en dur.
        localStorage.setItem('supabase_url', SUPABASE_URL);
        localStorage.setItem('supabase_anon_key', SUPABASE_ANON_KEY);

        const bootError = document.getElementById('bootError');

        async function boot() {
            try {
                const { createClient } = supabase;
                const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                const { data, error } = await client.auth.getSession();
                if (error) throw error;

                if (data && data.session) {
                    window.location.href = 'dashboard.html';
                } else {
                    window.location.href = 'login.html';
                }
            } catch (err) {
                console.error('[Boot] Erreur de connexion à Supabase :', err.message);
                bootError.textContent = "Impossible de contacter le serveur. Vérifiez votre connexion internet ou réessayez plus tard.";
                bootError.classList.remove('hidden');
            }
        }

        boot();
    </script>
</body>
</html>
