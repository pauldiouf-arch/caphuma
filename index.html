<!DOCTYPE html>
<html lang="fr" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Cap Huma</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Supabase CDN (Standard Non-Module) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Configuration de la charte graphique d'origine (ALIMA / Cap Huma) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            DEFAULT: '#1d4ed8', // Bleu ALIMA d'origine
                            dark: '#1e3a8a',
                            light: '#eff6ff',
                        },
                        accent: {
                            DEFAULT: '#ea580c', // Orange humanitaire d'origine
                            dark: '#c2410c',
                            light: '#fff7ed',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="flex min-h-full items-center justify-center p-4 relative antialiased overflow-hidden">

    <!-- Fond dégradé premium d'origine -->
    <div class="absolute inset-0 -z-10 bg-[radial-gradient(135deg,_#f8fafc_30%,_#fff7ed_100%)]"></div>

    <div class="w-full max-w-md transform overflow-hidden rounded-2xl bg-white p-8 shadow-xl border border-slate-100 transition-all duration-300 hover:shadow-2xl">
        
        <!-- En-tête / Logo d'origine -->
        <div class="flex flex-col items-center text-center space-y-4 mb-8">
            <div class="flex h-16 w-16 items-center justify-center rounded-2xl bg-gradient-to-br from-primary to-accent text-white shadow-lg animate-bounce duration-1000">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-9 h-9">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25s-7.5-4.108-7.5-11.25a7.5 7.5 0 1 1 15 0Z" />
                </svg>
            </div>
            <div>
                <h1 class="text-3xl font-extrabold bg-gradient-to-r from-primary-dark to-accent bg-clip-text text-transparent">
                    Cap Huma
                </h1>
                <p class="text-sm text-slate-500 font-medium mt-1.5">
                    Orienter et piloter les trajectoires professionnelles.
                </p>
            </div>
        </div>

        <!-- Bandeau d'alerte rouge soigné (masqué par défaut) -->
        <div id="errorAlert" class="hidden mb-6 flex items-start gap-3 rounded-lg border border-red-200 bg-red-50 p-4 text-sm text-red-700 transition-all duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 shrink-0 mt-0.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
            </svg>
            <div>
                <p id="errorMessage" class="font-medium leading-relaxed"></p>
            </div>
        </div>

        <!-- Formulaire de Connexion -->
        <form id="loginForm" class="space-y-5">
            <!-- Email -->
            <div class="space-y-1.5">
                <label for="email" class="text-sm font-semibold text-slate-700">Adresse email</label>
                <input 
                    id="email" 
                    type="email" 
                    required 
                    placeholder="nom.prenom@alima.ngo"
                    class="w-full rounded-lg border border-slate-200 px-3.5 py-2 text-sm text-slate-800 placeholder-slate-400 shadow-sm outline-none transition-all focus:border-primary focus:ring-2 focus:ring-primary/20"
                />
            </div>

            <!-- Mot de passe / Code d'accès -->
            <div class="space-y-1.5">
                <label for="password" class="text-sm font-semibold text-slate-700">Code d'accès personnel</label>
                <input 
                    id="password" 
                    type="password" 
                    required 
                    placeholder="••••••••••••"
                    class="w-full rounded-lg border border-slate-200 px-3.5 py-2 text-sm text-slate-800 placeholder-slate-400 shadow-sm outline-none transition-all focus:border-primary focus:ring-2 focus:ring-primary/20"
                />
            </div>

            <!-- Bouton de validation d'origine -->
            <button 
                id="submitBtn" 
                type="submit" 
                class="w-full flex items-center justify-center gap-2 rounded-lg bg-primary py-2.5 text-sm font-bold text-white shadow-md transition-all hover:bg-primary-dark hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-primary/50 disabled:opacity-50"
            >
                <svg id="btnSpinner" class="hidden h-4 w-4 animate-spin text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647Z"></path>
                </svg>
                <span id="btnText">Se connecter</span>
            </button>
        </form>

        <!-- Zone de pied de page -->
        <div class="mt-8 border-t border-slate-100 pt-6 text-center">
            <p class="text-xs text-slate-400 leading-normal">
                Ce portail de gestion de talents est protégé.<br/>
                En cas de perte de vos identifiants, contactez votre administrateur.
            </p>
        </div>
    </div>

    <!-- Script de Connexion Supabase en mode Client Direct (sans module d'importation) -->
    <script>
        // 1. Initialisation de Supabase via l'objet global exposé par le CDN
        const { createClient } = supabase;

        const SUPABASE_URL = "https://bhjycotcmkqiumukkkih.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_mtQU2zMhbkCPZjgCX3Z4hw_POMFm_ml";

        const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 2. Liaison des éléments du DOM
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const errorAlert = document.getElementById('errorAlert');
        const errorMessage = document.getElementById('errorMessage');

        if (loginForm) {
            loginForm.addEventListener('submit', async (e) => {
                // Bloque le rechargement natif de la page
                e.preventDefault();
                
                // Réinitialisation de l'affichage des erreurs
                if (errorAlert) errorAlert.classList.add('hidden');
                if (errorMessage) errorMessage.textContent = '';

                const emailInput = document.getElementById('email');
                const passwordInput = document.getElementById('password');

                if (!emailInput || !passwordInput) {
                    showUIError("Éléments de saisie introuvables.");
                    return;
                }

                const email = emailInput.value.trim();
                const password = passwordInput.value;

                if (!email || !password) {
                    showUIError("Veuillez renseigner tous les champs.");
                    return;
                }

                // Activer l'état visuel de chargement
                setLoadingState(true);

                try {
                    // A. Authentification standard auprès de Supabase Auth
                    const { data: authData, error: authError } = await _supabase.auth.signInWithPassword({
                        email: email,
                        password: password
                    });

                    if (authError) {
                        throw authError;
                    }

                    const user = authData.user;

                    // B. Récupération asouplie (sans .single() strict) des informations de l'utilisateur
                    const { data: profiles, error: profileError } = await _supabase
                        .from('users')
                        .select('role, is_active, created_at')
                        .eq('id', user.id);

                    // Si le profil existe en base, nous appliquons nos verrous métiers de sécurité
                    if (!profileError && profiles && profiles.length > 0) {
                        const profile = profiles[0];

                        // Verrou 1 : Compte suspendu
                        if (profile.is_active === false) {
                            await _supabase.auth.signOut();
                            throw new Error("Ce compte utilisateur a été temporairement désactivé.");
                        }

                        // Verrou 2 : Vérification de l'expiration du rôle 'visiteur' (7 jours)
                        if (profile.role === 'visitor') {
                            const ageMs = Date.now() - new Date(profile.created_at).getTime();
                            const expirationMs = 7 * 24 * 60 * 60 * 1000;
                            
                            if (ageMs > expirationMs) {
                                await _supabase.auth.signOut();
                                throw new Error("Votre accès temporaire en tant que Visiteur a expiré.");
                            }
                        }
                    }

                    // C. Redirection fluide vers le dashboard
                    window.location.href = 'dashboard.html';

                } catch (error) {
                    console.error("[Login Error] :", error);
                    showUIError(error.message || "Erreur de connexion. Veuillez vérifier vos identifiants.");
                } finally {
                    // Désactivation de l'état de chargement
                    setLoadingState(false);
                }
            });
        }

        function setLoadingState(isLoading) {
            if (!submitBtn || !btnSpinner || !btnText) return;

            if (isLoading) {
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-75', 'cursor-not-allowed');
                btnSpinner.classList.remove('hidden');
                btnText.textContent = 'Vérification en cours...';
            } else {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                btnSpinner.classList.add('hidden');
                btnText.textContent = 'Se connecter';
            }
        }

        function showUIError(message) {
            if (errorMessage && errorAlert) {
                errorMessage.textContent = message;
                errorAlert.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
