<!DOCTYPE html>
<html lang="fr" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dévalidés - Cap Huma</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Supabase CDN (Standard Non-Module) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Charte graphique ALIMA / Cap Huma (identique à dashboard.html) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            DEFAULT: '#1d4ed8',
                            dark: '#1e3a8a',
                            light: '#eff6ff',
                        },
                        accent: {
                            DEFAULT: '#ea580c',
                            dark: '#c2410c',
                            light: '#fff7ed',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full bg-slate-50 font-sans flex flex-col overflow-hidden" id="appBody" style="display: none;">

    <!-- ────────────────────────────────────────────────────────────────────────
         EN-TÊTE SUPÉRIEUR
         ──────────────────────────────────────────────────────────────────────── -->
    <header class="border-b bg-white shadow-sm shrink-0 z-10">
        <div class="container mx-auto px-6 py-4 flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <a href="dashboard.html" class="flex h-12 w-12 items-center justify-center rounded-xl bg-gradient-to-br from-primary to-accent text-white shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-7 h-7">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 14.15v4.25c0 .621-.504 1.125-1.125 1.125H4.875c-.621 0-1.125-.504-1.125-1.125v-4.25m16.5 0a2.18 2.18 0 0 0 .75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 0 0-3.413-.387m4.5 8.006c-.194.165-.45.258-.717.258H3.571a.8.8 0 0 1-.717-.258m17.5 0a2.18 2.18 0 0 1-.75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 0 0-3.413-.387m0 0a48.58 48.58 0 0 0-6.177 0m6.177 0v1.502a2.25 2.25 0 0 1-2.25 2.25H9.75a2.25 2.25 0 0 1-2.25-2.25V6.144m6.177 0a48.114 48.114 0 0 0-3.413.387m0 0a48.58 48.58 0 0 1-6.177 0" />
                    </svg>
                </a>
                <div>
                    <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">Cap Huma</h1>
                    <p class="text-xs text-slate-400 font-semibold mt-1">⛔ Gestion des talents dévalidés</p>
                </div>
            </div>

            <nav class="flex items-center gap-2 flex-wrap justify-end">
                <a href="dashboard.html" class="border border-slate-200 hover:bg-slate-50 text-slate-600 px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all">
                    ← Tableau de bord
                </a>
                <a href="red_list.html" class="border border-orange-200 hover:bg-orange-50 text-orange-700 px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all">
                    ⚠️ Liste Rouge
                </a>
                <button id="logoutBtn" class="flex h-9 w-9 items-center justify-center rounded-xl border border-slate-200 text-slate-500 hover:bg-slate-50 transition-all shrink-0" title="Déconnexion">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l3 3m0 0-3 3m3-3H2.25" />
                    </svg>
                </button>
            </nav>
        </div>
    </header>

    <!-- ────────────────────────────────────────────────────────────────────────
         ZONE PRINCIPALE
         ──────────────────────────────────────────────────────────────────────── -->
    <main class="max-w-6xl w-full mx-auto px-6 py-8 flex-1 overflow-auto">

        <div class="mb-6">
            <h2 class="text-xl font-extrabold text-slate-800">Talents dévalidés, répartis par pool</h2>
            <p class="text-sm text-slate-400 mt-1">Réintégrez un talent, transférez-le vers la Liste Rouge, ou supprimez-le définitivement.</p>
        </div>

        <p id="pageError" class="hidden mb-6 text-sm font-semibold text-red-600 bg-red-50 border border-red-100 rounded-lg p-4"></p>

        <div id="poolsContainer" class="space-y-6">
            <!-- Squelette de chargement -->
            <div class="animate-pulse bg-white border border-slate-200 rounded-2xl h-32"></div>
            <div class="animate-pulse bg-white border border-slate-200 rounded-2xl h-32"></div>
        </div>

        <p id="emptyState" class="hidden text-center text-sm text-slate-400 font-semibold py-12">
            ✅ Aucun talent dévalidé actuellement.
        </p>

    </main>

    <!-- ────────────────────────────────────────────────────────────────────────
         MODALE : Mettre en Liste Rouge (motif obligatoire)
         ──────────────────────────────────────────────────────────────────────── -->
    <div id="redListModal" class="hidden fixed inset-0 bg-slate-900/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-6">
            <h3 class="text-lg font-extrabold text-slate-800 mb-1">Ajouter à la Liste Rouge</h3>
            <p class="text-sm text-slate-400 mb-4" id="redListModalTalentName"></p>
            <label class="text-xs font-bold text-slate-600 mb-1 block">Motif (obligatoire)</label>
            <textarea id="redListReasonInput" rows="4" class="w-full border border-slate-200 rounded-lg p-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary" placeholder="Expliquez le motif du signalement..."></textarea>
            <p id="redListModalError" class="hidden text-xs font-semibold text-red-600 mt-2"></p>
            <div class="flex justify-end gap-2 mt-5">
                <button id="redListModalCancel" class="px-4 py-2 rounded-lg text-xs font-bold text-slate-500 hover:bg-slate-100">Annuler</button>
                <button id="redListModalConfirm" class="px-4 py-2 rounded-lg text-xs font-bold text-white bg-red-600 hover:bg-red-700">Confirmer le signalement</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================================
        // 1. INITIALISATION SUPABASE (lecture dynamique localStorage, pont de compatibilité)
        // ============================================================================
        const SUPABASE_URL = localStorage.getItem('supabase_url');
        const SUPABASE_ANON_KEY = localStorage.getItem('supabase_anon_key');

        if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
            window.location.replace('index.html');
        }

        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const appBody = document.getElementById('appBody');
        const poolsContainer = document.getElementById('poolsContainer');
        const pageError = document.getElementById('pageError');
        const emptyState = document.getElementById('emptyState');

        let currentUserId = null;
        let currentUserName = null;
        let currentUserRole = null;
        let currentUserEmail = null;

        // Échappement HTML systématique de toute donnée provenant de la base
        // avant injection via innerHTML — prévention XSS.
        function escapeHtml(value) {
            if (value === null || value === undefined) return '';
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // ============================================================================
        // JOURNAL D'AUDIT (Étape 8) — voir id-card.html pour la logique détaillée.
        // Ne bloque jamais l'action métier si l'écriture du log échoue.
        // ============================================================================
        async function logAuditAction(action, entityType, entityId, entityName, details) {
            try {
                await supabaseClient.from('audit_logs').insert({
                    user_id: currentUserId,
                    user_email: currentUserEmail,
                    user_name: currentUserName,
                    action: action,
                    entity_type: entityType,
                    entity_id: entityId || null,
                    entity_name: entityName || null,
                    details: details || null
                });
            } catch (err) {
                console.warn("[Audit] Échec de l'enregistrement du log :", err);
            }
        }

        // ============================================================================
        // 2. GARDE DE SESSION (identique au pattern de dashboard.html)
        // ============================================================================
        async function checkSession() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();

                if (!session) {
                    throw new Error("Session absente ou expirée.");
                }

                currentUserId = session.user.id;
                currentUserEmail = session.user.email || null;

                const { data: profiles, error: profileError } = await supabaseClient
                    .from('users')
                    .select('role, name, is_active')
                    .eq('id', currentUserId);

                if (!profileError && profiles && profiles.length > 0) {
                    const profile = profiles[0];
                    if (profile.is_active === false) throw new Error("Compte désactivé.");
                    currentUserRole = profile.role;
                    currentUserName = profile.name || session.user.email || 'Inconnu';
                } else {
                    currentUserRole = null;
                    currentUserName = session.user.email || 'Inconnu';
                }

                // Page réservée admin + user (recruteur), bloquée pour visitor
                if (currentUserRole === 'visitor') {
                    throw new Error("Accès non autorisé pour ce rôle.");
                }

                appBody.style.display = 'flex';
                await loadDevalidatedTalents();

            } catch (error) {
                console.warn("[Session Guard] Accès refusé, expulsion :", error.message);
                window.location.replace('dashboard.html');
            }
        }

        checkSession();

        document.getElementById('logoutBtn').addEventListener('click', async function () {
            await logAuditAction('logout', 'user', currentUserId, currentUserEmail, null);
            await supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        });

        // ============================================================================
        // 3. CHARGEMENT DES TALENTS DÉVALIDÉS, REGROUPÉS PAR POOL
        // ============================================================================
        async function loadDevalidatedTalents() {
            try {
                const [poolsRes, talentsRes] = await Promise.all([
                    supabaseClient.from('pools').select('pool_id, name, full_name').order('name', { ascending: true }),
                    supabaseClient
                        .from('talents')
                        .select('id, first_name, last_name, pool, is_red_listed, devalidation_date, months_without_mission')
                        .eq('is_valid', false)
                        .order('devalidation_date', { ascending: false })
                ]);

                if (poolsRes.error) throw poolsRes.error;
                if (talentsRes.error) throw talentsRes.error;

                const pools = poolsRes.data || [];
                const talents = talentsRes.data || [];

                if (talents.length === 0) {
                    poolsContainer.innerHTML = '';
                    emptyState.classList.remove('hidden');
                    return;
                }

                renderGroupedByPool(pools, talents);

            } catch (error) {
                console.error("Erreur de chargement des dévalidés :", error);
                poolsContainer.innerHTML = '';
                pageError.textContent = "Impossible de charger les talents dévalidés : " + (error.message || 'erreur inconnue');
                pageError.classList.remove('hidden');
            }
        }

        function renderGroupedByPool(pools, talents) {
            poolsContainer.innerHTML = '';

            // Regroupement par pool_id, en conservant l'ordre des pools connus
            const grouped = {};
            talents.forEach(t => {
                const key = t.pool || '—';
                if (!grouped[key]) grouped[key] = [];
                grouped[key].push(t);
            });

            const poolLabel = (poolId) => {
                const found = pools.find(p => p.pool_id === poolId);
                return found ? (found.full_name || found.name) : poolId;
            };

            Object.keys(grouped).forEach(poolId => {
                const section = document.createElement('div');
                section.className = "bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden";

                const header = document.createElement('div');
                header.className = "px-5 py-3 bg-slate-50 border-b border-slate-200 flex items-center justify-between";
                header.innerHTML = `
                    <h3 class="text-sm font-extrabold text-slate-700">${escapeHtml(poolLabel(poolId))}</h3>
                    <span class="text-xs font-bold text-slate-400">${grouped[poolId].length} talent(s)</span>
                `;
                section.appendChild(header);

                const list = document.createElement('div');
                list.className = "divide-y divide-slate-100";

                grouped[poolId].forEach(t => {
                    list.appendChild(renderTalentRow(t));
                });

                section.appendChild(list);
                poolsContainer.appendChild(section);
            });
        }

        function renderTalentRow(t) {
            const row = document.createElement('div');
            row.className = "px-5 py-4 flex flex-wrap items-center justify-between gap-3";

            const dateStr = t.devalidation_date
                ? new Date(t.devalidation_date).toLocaleDateString('fr-FR')
                : 'Date inconnue';

            const redListBadge = t.is_red_listed
                ? `<span class="ml-2 text-[10px] font-bold text-red-600 bg-red-50 border border-red-100 rounded px-1.5 py-0.5">Déjà en Liste Rouge</span>`
                : '';

            row.innerHTML = `
                <div>
                    <a href="id-card.html?id=${encodeURIComponent(t.id)}" class="font-bold text-sm text-slate-800 hover:text-primary transition-all">
                        ${escapeHtml(t.first_name)} ${escapeHtml(t.last_name)}
                    </a>
                    ${redListBadge}
                    <p class="text-xs text-slate-400 mt-0.5">
                        Dévalidé le ${dateStr}
                        ${t.months_without_mission !== null && t.months_without_mission !== undefined ? ` · ${escapeHtml(t.months_without_mission)} mois sans mission` : ''}
                    </p>
                </div>
                <div class="flex items-center gap-2 flex-wrap">
                    <button class="btn-reintegrer bg-emerald-50 hover:bg-emerald-100 text-emerald-700 border border-emerald-200 px-3 py-2 rounded-lg text-xs font-bold transition-all">
                        ✅ Réintégrer
                    </button>
                    ${!t.is_red_listed ? `
                    <button class="btn-redlist bg-orange-50 hover:bg-orange-100 text-orange-700 border border-orange-200 px-3 py-2 rounded-lg text-xs font-bold transition-all">
                        ⚠️ Liste Rouge
                    </button>` : ''}
                    ${currentUserRole === 'admin' ? `
                    <button class="btn-delete bg-red-600 hover:bg-red-700 text-white px-3 py-2 rounded-lg text-xs font-bold transition-all">
                        🗑️ Supprimer définitivement
                    </button>` : ''}
                </div>
            `;

            row.querySelector('.btn-reintegrer').addEventListener('click', () => reintegrateTalent(t));
            const redListBtn = row.querySelector('.btn-redlist');
            if (redListBtn) redListBtn.addEventListener('click', () => openRedListModal(t));
            const deleteBtn = row.querySelector('.btn-delete');
            if (deleteBtn) deleteBtn.addEventListener('click', () => deleteTalentDefinitively(t));

            return row;
        }

        // ============================================================================
        // 4. ACTION : RÉINTÉGRER (identique à la logique de id-card.html, section 6.4)
        // ============================================================================
        async function reintegrateTalent(t) {
            const confirmed = confirm(`Réintégrer ${t.first_name} ${t.last_name} ?\n\nLe talent redeviendra valide et retrouvera son statut normal dans les listes.`);
            if (!confirmed) return;

            try {
                const { error } = await supabaseClient
                    .from('talents')
                    .update({
                        is_valid: true,
                        devalidation_date: null,
                        devalidation_extension_until: null,
                        devalidation_extension_months: null,
                        devalidation_extension_granted_by: null,
                        devalidation_extension_granted_by_name: null,
                        devalidation_extension_granted_at: null
                    })
                    .eq('id', t.id);

                if (error) throw error;

                await logAuditAction('reintegrate', 'talent', t.id, `${t.first_name} ${t.last_name}`.trim(), null);
                await loadDevalidatedTalents();

            } catch (error) {
                alert("Erreur lors de la réintégration : " + (error.message || 'erreur inconnue'));
            }
        }

        // ============================================================================
        // 5. ACTION : METTRE EN LISTE ROUGE (même dialogue que red_list.html / id-card.html)
        // ============================================================================
        let redListTargetTalent = null;
        const redListModal = document.getElementById('redListModal');
        const redListReasonInput = document.getElementById('redListReasonInput');
        const redListModalError = document.getElementById('redListModalError');
        const redListModalTalentName = document.getElementById('redListModalTalentName');

        function openRedListModal(t) {
            redListTargetTalent = t;
            redListReasonInput.value = '';
            redListModalError.classList.add('hidden');
            redListModalTalentName.textContent = `${t.first_name} ${t.last_name}`;
            redListModal.classList.remove('hidden');
            redListModal.classList.add('flex');
        }

        function closeRedListModal() {
            redListModal.classList.add('hidden');
            redListModal.classList.remove('flex');
            redListTargetTalent = null;
        }

        document.getElementById('redListModalCancel').addEventListener('click', closeRedListModal);

        document.getElementById('redListModalConfirm').addEventListener('click', async () => {
            const reason = redListReasonInput.value.trim();
            if (!reason) {
                redListModalError.textContent = "Le motif est obligatoire.";
                redListModalError.classList.remove('hidden');
                return;
            }

            try {
                const { error } = await supabaseClient
                    .from('talents')
                    .update({
                        is_red_listed: true,
                        red_list_date: new Date().toISOString(),
                        red_list_reason: reason,
                        red_list_added_by: currentUserId,
                        red_list_added_by_name: currentUserName
                    })
                    .eq('id', redListTargetTalent.id);

                if (error) throw error;

                await logAuditAction('add_to_red_list', 'talent', redListTargetTalent.id, `${redListTargetTalent.first_name} ${redListTargetTalent.last_name}`.trim(), reason);
                closeRedListModal();
                await loadDevalidatedTalents();

            } catch (error) {
                redListModalError.textContent = "Erreur : " + (error.message || 'erreur inconnue');
                redListModalError.classList.remove('hidden');
            }
        });

        // ============================================================================
        // 6. ACTION : SUPPRESSION DÉFINITIVE
        // ============================================================================
        async function deleteTalentDefinitively(t) {
            const confirmed = confirm(
                `⚠️ SUPPRESSION DÉFINITIVE de ${t.first_name} ${t.last_name}.\n\n` +
                `Cette action est irréversible et efface toute la fiche du talent (historique compris).\n\n` +
                `Rappel : certaines suppressions sont normalement prises en charge automatiquement par le mécanisme RGPD du site sous certaines conditions. ` +
                `Utilisez ce bouton uniquement pour une suppression manuelle volontaire.\n\n` +
                `Confirmez-vous ?`
            );
            if (!confirmed) return;

            const doubleCheck = confirm("Dernière confirmation : voulez-vous vraiment supprimer définitivement cette fiche ?");
            if (!doubleCheck) return;

            try {
                // Nettoyage des données liées avant suppression du talent — la règle
                // ON DELETE de ces FK vers talents.id n'a jamais été vérifiée, donc
                // suppression défensive plutôt que de compter sur une cascade non confirmée
                // (même correctif que id-card.html, cf. Master Context règle de méthode n°19).
                await supabaseClient.from('evaluations').delete().eq('talent_id', t.id);
                await supabaseClient.from('comments').delete().eq('talent_id', t.id);
                await supabaseClient.from('share_tokens').delete().eq('talent_id', t.id);

                const { data, error } = await supabaseClient
                    .from('talents')
                    .delete()
                    .eq('id', t.id)
                    .select('id');

                if (error) throw error;

                // Un DELETE Supabase peut "réussir" sans erreur tout en n'affectant aucune
                // ligne si une policy RLS bloque silencieusement (cf. Master Context règle de
                // méthode n°15) — vérification explicite plutôt qu'un faux succès.
                if (!data || data.length === 0) {
                    throw new Error("La suppression n'a affecté aucune ligne (policy RLS ?).");
                }

                await logAuditAction('delete', 'talent', t.id, `${t.first_name} ${t.last_name}`.trim(), "Suppression RGPD depuis devalidated.html (talent dévalidé)");
                await loadDevalidatedTalents();

            } catch (error) {
                alert("Erreur lors de la suppression : " + (error.message || 'erreur inconnue') + "\n\nSi cette erreur persiste, il est possible qu'une policy RLS bloque la suppression directe pour votre rôle — à vérifier côté Supabase.");
            }
        }
    </script>
</body>
</html>
