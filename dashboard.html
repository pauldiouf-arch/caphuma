<!DOCTYPE html>
<html lang="fr" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de bord - Cap Huma</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Supabase CDN (Standard Non-Module) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="shared/caphuma-utils.js"></script>
    <script src="shared/caphuma-auth.js"></script>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Charte graphique ALIMA / Cap Huma (identique à missions.html) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            DEFAULT: '#1d4ed8',
                            dark: '#1e3a8a',
                            light: '#eff6ff',
                        },
                        accent: {
                            DEFAULT: '#ea580c',
                            dark: '#c2410c',
                            light: '#fff7ed',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full bg-slate-50 font-sans flex flex-col overflow-hidden" id="appBody" style="display: none;">

    <!-- ────────────────────────────────────────────────────────────────────────
         EN-TÊTE SUPÉRIEUR (identique structure à missions.html)
         ──────────────────────────────────────────────────────────────────────── -->
    <header class="border-b bg-white shadow-sm shrink-0 z-10">
        <div class="container mx-auto px-6 py-4 flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-gradient-to-br from-primary to-accent text-white shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-7 h-7">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 14.15v4.25c0 .621-.504 1.125-1.125 1.125H4.875c-.621 0-1.125-.504-1.125-1.125v-4.25m16.5 0a2.18 2.18 0 0 0 .75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 0 0-3.413-.387m4.5 8.006c-.194.165-.45.258-.717.258H3.571a.8.8 0 0 1-.717-.258m17.5 0a2.18 2.18 0 0 1-.75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 0 0-3.413-.387m0 0a48.58 48.58 0 0 0-6.177 0m6.177 0v1.502a2.25 2.25 0 0 1-2.25 2.25H9.75a2.25 2.25 0 0 1-2.25-2.25V6.144m6.177 0a48.114 48.114 0 0 0-3.413.387m0 0a48.58 48.58 0 0 1-6.177 0" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">Cap Huma</h1>
                    <p class="text-xs text-slate-400 font-semibold mt-1" id="userSubtitle">Tableau de bord</p>
                </div>
            </div>

            <nav class="flex items-center gap-2 flex-wrap justify-end">
                <a href="guide.html" class="border border-emerald-200 hover:bg-emerald-50 text-emerald-700 px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all">
                    📖 Guide
                </a>
                <a href="extraction.html" id="navExtraction" class="border border-teal-200 hover:bg-teal-50 text-teal-700 px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all">
                    📤 Extraction
                </a>
                <a href="red_list.html" id="navRedList" class="border border-orange-200 hover:bg-orange-50 text-orange-700 px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all">
                    ⚠️ Liste Rouge
                </a>
                <a href="devalidated.html" id="navDevalidated" class="border border-red-200 hover:bg-red-50 text-red-700 px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all">
                    ⛔ Dévalidés
                </a>
                <a href="statistics.html" class="bg-primary-light hover:bg-blue-100 text-primary px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all">
                    📊 Hub Statistique &amp; IA
                </a>

                <span id="adminNavGroup" class="hidden items-center gap-2">
                    <span class="h-6 w-px bg-slate-200 mx-1"></span>
                    <a href="admin.html" class="bg-slate-800 hover:bg-slate-900 text-white px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all">
                        🛡️ Admin
                    </a>
                    <a href="audit_logs.html" class="border border-slate-200 hover:bg-slate-50 text-slate-600 px-3 py-2 rounded-lg text-xs font-bold flex items-center gap-1.5 transition-all">
                        📋 Audit
                    </a>
                </span>

                <button id="logoutBtn" class="flex h-9 w-9 items-center justify-center rounded-xl border border-slate-200 text-slate-500 hover:bg-slate-50 transition-all shrink-0" title="Déconnexion">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l3 3m0 0-3 3m3-3H2.25" />
                    </svg>
                </button>
            </nav>
        </div>
    </header>

    <!-- ────────────────────────────────────────────────────────────────────────
         ZONE PRINCIPALE : CARTES DE POOLS
         ──────────────────────────────────────────────────────────────────────── -->
    <main class="max-w-7xl w-full mx-auto px-6 py-8 flex-1 overflow-auto">

        <div class="mb-6 flex items-end justify-between flex-wrap gap-3">
            <div>
                <h2 class="text-xl font-extrabold text-slate-800">Sélectionnez un pool</h2>
                <p class="text-sm text-slate-400 mt-1">Accédez à la gestion terrain ou aux statistiques de chaque vivier métier.</p>
            </div>
            <div id="archivedToggleContainer" class="hidden">
                <button id="archivedToggleBtn" type="button" class="border border-slate-200 hover:bg-slate-50 text-slate-500 px-3 py-2 rounded-lg text-xs font-bold transition-all"></button>
            </div>
        </div>

        <div id="poolsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
            <!-- Squelettes de chargement -->
            <div class="animate-pulse bg-white border border-slate-200 rounded-3xl h-48"></div>
            <div class="animate-pulse bg-white border border-slate-200 rounded-3xl h-48"></div>
            <div class="animate-pulse bg-white border border-slate-200 rounded-3xl h-48"></div>
        </div>

        <p id="poolsError" class="hidden mt-6 text-sm font-semibold text-red-600 bg-red-50 border border-red-100 rounded-lg p-4"></p>

    </main>

    <script>
        // ============================================================================
        // 1. INITIALISATION SUPABASE (lecture dynamique localStorage, jamais en dur)
        // ============================================================================
        const SUPABASE_URL = localStorage.getItem('supabase_url');
        const SUPABASE_ANON_KEY = localStorage.getItem('supabase_anon_key');

        if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
            window.location.replace('index.html');
        }

        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const appBody = document.getElementById('appBody');
        const poolsGrid = document.getElementById('poolsGrid');
        const poolsError = document.getElementById('poolsError');
        const userSubtitle = document.getElementById('userSubtitle');
        const archivedToggleContainer = document.getElementById('archivedToggleContainer');
        const archivedToggleBtn = document.getElementById('archivedToggleBtn');

        archivedToggleBtn.addEventListener('click', function () {
            showArchivedPools = !showArchivedPools;
            renderPools();
        });

        // Échappement HTML systématique de toute donnée venant de la base
        // avant injection via innerHTML — prévention XSS (audit sécurité).

        // Pools de secours si la table Supabase est vide ou inaccessible
        const FALLBACK_POOLS = [
            { pool_id: 'COLOG', name: 'COLOG', full_name: 'Pool Logistique', is_archived: false },
            { pool_id: 'COMED', name: 'COMED', full_name: 'Pool Médical', is_archived: false },
            { pool_id: 'ADMIN', name: 'ADMIN', full_name: 'Pool Administration', is_archived: false }
        ];

        // Seuil "à risque" aligné sur talents.html (surlignage rouge ≥24 mois sans mission)
        const MONTHS_WITHOUT_MISSION_RISK_THRESHOLD = 24;

        // État en mémoire : liste brute des pools, KPIs calculés par pool, affichage des archivés
        let currentPools = [];
        let poolStats = {};
        let showArchivedPools = false;
        let currentUserId = null;
        let currentUserEmail = null;

        // ============================================================================
        // JOURNAL D'AUDIT (Étape 8) — voir id-card.html pour la logique détaillée.
        // Ne bloque jamais l'action métier si l'écriture du log échoue.
        // ============================================================================
        async function logAuditAction(action, entityType, entityId, entityName, details) {
            // Délègue à shared/caphuma-auth.js (fonction commune) — corrige au passage
            // le fait que user_name n'était jamais transmis sur certaines pages.
            const userName = typeof currentUserName !== 'undefined' ? currentUserName : null;
            await capHumaLogAudit(
                supabaseClient,
                { userId: currentUserId, userEmail: currentUserEmail, userName: userName },
                action, entityType, entityId, entityName, details
            );
        }

        // ============================================================================
        // 2. GARDE DE SESSION (identique au pattern de missions.html)
        // ============================================================================
        async function checkSession() {
            try {
                const s = await capHumaInitSession(supabaseClient);
                currentUserId = s.userId;
                currentUserEmail = s.email;
                currentUserName = s.name;

                if (s.role) {
                    userSubtitle.textContent = `Connecté en tant que ${s.role || 'utilisateur'}`;

                    // Affichage conditionnel des boutons réservés aux admins
                    if (s.role === 'admin') {
                        document.getElementById('adminNavGroup').classList.remove('hidden');
                        document.getElementById('adminNavGroup').classList.add('flex');
                    }
                    // Le bouton Extraction est réservé aux recruteurs et admins (pas aux visiteurs)
                    if (s.role === 'visitor') {
                        document.getElementById('navExtraction').classList.add('hidden');
                        document.getElementById('navRedList').classList.add('hidden');
                        document.getElementById('navDevalidated').classList.add('hidden');
                    }
                } else {
                    userSubtitle.textContent = 'Tableau de bord';
                }

                appBody.style.display = 'flex';
                await loadPools();

            } catch (error) {
                console.warn("[Session Guard] Accès refusé, expulsion :", error.message);
                try {
                    await supabaseClient.auth.signOut();
                } catch (logoutErr) {}
                window.location.replace('login.html');
            }
        }

        checkSession();

        document.getElementById('logoutBtn').addEventListener('click', async function () {
            await logAuditAction('logout', 'user', currentUserId, currentUserEmail, null);
            await supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        });

        // ============================================================================
        // 3. CHARGEMENT DES POOLS ET RENDU DES CARTES
        // ============================================================================
        async function loadPools() {
            try {
                const { data: pools, error } = await supabaseClient
                    .from('pools')
                    .select('pool_id, name, full_name, is_archived')
                    .order('name', { ascending: true });

                if (error) throw error;

                currentPools = pools && pools.length > 0 ? pools : FALLBACK_POOLS;

            } catch (error) {
                console.error("Erreur de récupération des pools :", error);
                currentPools = FALLBACK_POOLS;
                poolsError.textContent = "Impossible de charger les pools depuis Supabase — affichage des pools par défaut.";
                poolsError.classList.remove('hidden');
            }

            await loadPoolStats();
            renderPools();
        }

        // ============================================================================
        // 3 BIS. CALCUL DES MINI-KPIS PAR POOL (Étape 4 — effectifs / dispo / à risque)
        // ============================================================================
        async function loadPoolStats() {
            poolStats = {};

            // 1. KPIs talents (effectif / dispo / à risque)
            try {
                // Colonnes strictement nécessaires (règle perf section 2 bis.2 du Master Context)
                const { data: talents, error } = await supabaseClient
                    .from('talents')
                    .select('pool, is_valid, is_red_listed, status, months_without_mission');

                if (error) throw error;

                (talents || []).forEach(talent => {
                    if (!talent.pool) return;

                    if (!poolStats[talent.pool]) {
                        poolStats[talent.pool] = { active: 0, available: 0, atRisk: 0, positions: 0 };
                    }

                    // Un talent "actif" = validé et pas en liste rouge
                    const isActive = talent.is_valid !== false && !talent.is_red_listed;
                    if (!isActive) return;

                    poolStats[talent.pool].active++;

                    if (talent.status === 'En attente de poste') {
                        poolStats[talent.pool].available++;
                    }

                    if ((talent.months_without_mission || 0) >= MONTHS_WITHOUT_MISSION_RISK_THRESHOLD) {
                        poolStats[talent.pool].atRisk++;
                    }
                });

            } catch (error) {
                // Ne bloque jamais l'affichage des cartes de pool : les KPIs restent à 0 en cas d'échec
                console.error("Erreur de récupération des KPIs talents :", error);
            }

            // 2. KPI postes (nombre total de missions du pool, tous statuts confondus)
            // ⚠️ Incohérence de schéma découverte cette session : la contrainte FK réelle
            // porte sur la colonne "pool" (missions_pool_fkey → pools.pool_id), mais l'unique
            // enregistrement réel observé avait "pool_id" rempli et "pool" vide. Aucune des deux
            // colonnes n'est donc fiable à 100% tant que ce n'est pas tranché avec l'utilisateur
            // (voir Master Context, Étape 5) → on lit les deux et on prend celle qui est renseignée.
            try {
                const { data: missions, error } = await supabaseClient
                    .from('missions')
                    .select('pool, pool_id');

                if (error) throw error;

                (missions || []).forEach(mission => {
                    const effectivePoolId = mission.pool || mission.pool_id;
                    if (!effectivePoolId) return;

                    if (!poolStats[effectivePoolId]) {
                        poolStats[effectivePoolId] = { active: 0, available: 0, atRisk: 0, positions: 0 };
                    }

                    poolStats[effectivePoolId].positions++;
                });

            } catch (error) {
                console.error("Erreur de récupération des KPIs postes :", error);
            }
        }

        function poolIcon(poolId) {
            const icons = {
                COLOG: '🚚',
                COMED: '🩺',
                ADMIN: '📁'
            };
            return icons[poolId] || '🌍';
        }

        function renderPools() {
            poolsGrid.innerHTML = '';

            const activePools = currentPools.filter(pool => pool.is_archived !== true);
            const archivedPools = currentPools.filter(pool => pool.is_archived === true);

            // Bouton de bascule visible uniquement s'il existe au moins un pool archivé
            if (archivedPools.length > 0) {
                archivedToggleContainer.classList.remove('hidden');
                archivedToggleBtn.textContent = showArchivedPools
                    ? `🔽 Masquer les pools archivés (${archivedPools.length})`
                    : `▶️ Afficher les pools archivés (${archivedPools.length})`;
            } else {
                archivedToggleContainer.classList.add('hidden');
            }

            const poolsToRender = showArchivedPools ? currentPools : activePools;

            if (poolsToRender.length === 0) {
                poolsGrid.innerHTML = '<p class="col-span-full text-center text-sm text-slate-400 py-12">Aucun pool à afficher.</p>';
                return;
            }

            poolsToRender.forEach(pool => {
                const stats = poolStats[pool.pool_id] || { active: 0, available: 0, atRisk: 0, positions: 0 };
                const isArchived = pool.is_archived === true;

                const card = document.createElement('div');
                card.className = "bg-white border border-slate-200 rounded-3xl shadow-sm p-6 flex flex-col justify-between transition-all"
                    + (isArchived ? " opacity-60" : " hover:shadow-md");

                card.innerHTML = `
                    <div>
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-primary-light text-2xl">
                                ${poolIcon(pool.pool_id)}
                            </div>
                            ${isArchived ? '<span class="text-[10px] font-bold uppercase tracking-wide text-slate-400 bg-slate-100 px-2 py-1 rounded-full">Archivé</span>' : ''}
                        </div>
                        <h3 class="text-lg font-extrabold text-slate-800">${escapeHtml(pool.name || pool.pool_id)}</h3>
                        <p class="text-xs text-slate-400 font-semibold mt-1">${escapeHtml(pool.full_name || '')}</p>

                        <div class="grid grid-cols-4 gap-1.5 mt-4">
                            <div class="bg-slate-50 rounded-xl px-1.5 py-2 text-center">
                                <p class="text-base font-extrabold text-slate-800">${stats.active}</p>
                                <p class="text-[10px] font-semibold text-slate-400 uppercase tracking-wide">Effectif</p>
                            </div>
                            <div class="bg-emerald-50 rounded-xl px-1.5 py-2 text-center">
                                <p class="text-base font-extrabold text-emerald-700">${stats.available}</p>
                                <p class="text-[10px] font-semibold text-emerald-500 uppercase tracking-wide">Dispo</p>
                            </div>
                            <div class="bg-red-50 rounded-xl px-1.5 py-2 text-center">
                                <p class="text-base font-extrabold text-red-700">${stats.atRisk}</p>
                                <p class="text-[10px] font-semibold text-red-500 uppercase tracking-wide">À risque</p>
                            </div>
                            <div class="bg-blue-50 rounded-xl px-1.5 py-2 text-center">
                                <p class="text-base font-extrabold text-primary">${stats.positions}</p>
                                <p class="text-[10px] font-semibold text-blue-400 uppercase tracking-wide">Postes</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-col gap-2 mt-6">
                        <div class="grid grid-cols-2 gap-2">
                            <a href="talents.html?pool=${encodeURIComponent(pool.pool_id)}" class="bg-primary hover:bg-primary-dark text-white px-3 py-2.5 rounded-lg text-xs font-bold text-center transition-all shadow-xs">
                                👤 Professionnels
                            </a>
                            <a href="missions.html?pool=${encodeURIComponent(pool.pool_id)}" class="bg-slate-100 hover:bg-slate-200 text-slate-700 border border-slate-200 px-3 py-2.5 rounded-lg text-xs font-bold text-center transition-all">
                                Postes
                            </a>
                        </div>
                        <a href="statistics.html?pool=${encodeURIComponent(pool.pool_id)}" class="bg-accent-light hover:bg-orange-100 text-accent-dark px-4 py-2.5 rounded-lg text-xs font-bold text-center transition-all">
                            📊 Statistiques du Pool
                        </a>
                    </div>
                `;

                poolsGrid.appendChild(card);
            });
        }
    </script>
</body>
</html>
